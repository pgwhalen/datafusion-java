name: Publish FFI Java

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'datafusion-ffi-native/**'
      - 'datafusion-ffi-java/**'
      - '.github/workflows/publish-ffi.yml'
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Compute release version from build.gradle (only meaningful on workflow_dispatch)
  compute-version:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.version.outputs.release_version }}
      next_snapshot: ${{ steps.version.outputs.next_snapshot }}
      is_release: ${{ steps.version.outputs.is_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        run: |
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "Not a release run"
            exit 0
          fi

          # Read version from build.gradle
          SNAPSHOT=$(grep "^version = " datafusion-ffi-java/build.gradle | sed "s/.*'\\(.*\\)'/\\1/")
          echo "Read version from build.gradle: $SNAPSHOT"

          if [[ "$SNAPSHOT" != *-SNAPSHOT ]]; then
            echo "::error::Version in build.gradle is not a SNAPSHOT version: $SNAPSHOT"
            exit 1
          fi

          # Strip -SNAPSHOT suffix for release version
          RELEASE="${SNAPSHOT%-SNAPSHOT}"
          echo "Release version: $RELEASE"

          # Compute next SNAPSHOT (increment patch)
          MAJOR=$(echo "$RELEASE" | cut -d. -f1)
          MINOR=$(echo "$RELEASE" | cut -d. -f2)
          PATCH=$(echo "$RELEASE" | cut -d. -f3)
          NEXT_SNAPSHOT="${MAJOR}.${MINOR}.$((PATCH + 1))-SNAPSHOT"
          echo "Next SNAPSHOT: $NEXT_SNAPSHOT"

          echo "release_version=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "next_snapshot=$NEXT_SNAPSHOT" >> "$GITHUB_OUTPUT"
          echo "is_release=true" >> "$GITHUB_OUTPUT"

  # Fast checks that don't need native libraries — runs in parallel with build-native
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            datafusion-ffi-native/target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-check-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-check-
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Generate Diplomat bindings (cargo check)
        run: cargo check
        working-directory: datafusion-ffi-native

      - name: Run spotlessCheck, javadoc, and verifyDocsLinksHttp
        run: ./gradlew :datafusion-ffi-java:spotlessCheck :datafusion-ffi-java:javadoc :datafusion-ffi-java:verifyDocsLinksHttp -PskipDiplomatGeneration

  # Build native libraries on all platforms
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux_64
            lib_name: libdatafusion_ffi_native.so
          - os: ubuntu-24.04-arm
            platform: linux_arm64
            lib_name: libdatafusion_ffi_native.so
            cargo_flags: '-j 2'  # Limit parallelism to avoid OOM on ARM runners
            cargo_profile: 'ci-arm'  # Use reduced-memory profile (no LTO)
          - os: macos-14
            platform: osx_64
            rust_target: x86_64-apple-darwin
            lib_name: libdatafusion_ffi_native.dylib
          - os: macos-14
            platform: osx_arm64
            lib_name: libdatafusion_ffi_native.dylib
          - os: windows-latest
            platform: windows_64
            lib_name: datafusion_ffi_native.dll
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            datafusion-ffi-native/target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Install cross-compilation target
        if: matrix.rust_target
        run: rustup target add ${{ matrix.rust_target }}

      - name: Build release library
        if: ${{ !matrix.rust_target }}
        run: cargo build --profile ${{ matrix.cargo_profile || 'release' }} ${{ matrix.cargo_flags || '' }}
        working-directory: datafusion-ffi-native

      - name: Build release library (cross-compile)
        if: matrix.rust_target
        run: cargo build --release --target ${{ matrix.rust_target }}
        working-directory: datafusion-ffi-native

      # On linux_64: upload Diplomat-generated Java bindings for build-jar
      - name: Upload Diplomat-generated sources
        if: matrix.platform == 'linux_64'
        uses: actions/upload-artifact@v4
        with:
          name: diplomat-generated
          path: datafusion-ffi-java/build/diplomat-generated/
          retention-days: 7
          if-no-files-found: error

      - name: Upload native library
        if: ${{ !matrix.rust_target }}
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: datafusion-ffi-native/target/${{ matrix.cargo_profile || 'release' }}/${{ matrix.lib_name }}
          retention-days: 7
          if-no-files-found: error

      - name: Upload native library (cross-compiled)
        if: matrix.rust_target
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: datafusion-ffi-native/target/${{ matrix.rust_target }}/release/${{ matrix.lib_name }}
          retention-days: 7
          if-no-files-found: error

  # Build JAR with all native libraries
  build-jar:
    needs: [build-native, checks, compute-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: datafusion-ffi-java/build/native-artifacts
          pattern: native-*
          merge-multiple: false

      - name: Download Diplomat-generated sources
        uses: actions/download-artifact@v4
        with:
          name: diplomat-generated
          path: datafusion-ffi-java/build/diplomat-generated

      - name: Organize native libraries
        run: ./scripts/organize-native-libs.sh

      - name: Build JAR with all native libraries
        run: |
          GRADLE_ARGS=":datafusion-ffi-java:jar :datafusion-ffi-java:sourcesJar :datafusion-ffi-java:javadocJar -PskipDiplomatGeneration"
          if [ "${{ needs.compute-version.outputs.is_release }}" = "true" ]; then
            GRADLE_ARGS="$GRADLE_ARGS -PreleaseVersion=${{ needs.compute-version.outputs.release_version }}"
          fi
          ./gradlew $GRADLE_ARGS

      - name: Verify JAR contents
        run: ./scripts/verify-jar-contents.sh

      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: datafusion-ffi-java-jars
          path: datafusion-ffi-java/build/libs/
          retention-days: 7

  # Test JAR on multiple platforms
  test-jar:
    needs: build-jar
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'

      - name: Download JAR artifacts
        uses: actions/download-artifact@v4
        with:
          name: datafusion-ffi-java-jars
          path: datafusion-ffi-java/build/libs

      - name: Run validation script (Unix)
        if: runner.os != 'Windows'
        run: ./scripts/validate-jar.sh

      - name: Run validation test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/validate-jar.ps1

  # Publish to GitHub Packages (manual trigger only)
  publish:
    needs: [test-jar, compute-version]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'

      - name: Download pre-built JAR artifacts
        uses: actions/download-artifact@v4
        with:
          name: datafusion-ffi-java-jars
          path: datafusion-ffi-java/build/libs

      - name: Publish to GitHub Packages
        run: ./gradlew :datafusion-ffi-java:publish -PpublishPrebuiltJars -PskipDiplomatGeneration -PreleaseVersion=${{ needs.compute-version.outputs.release_version }}
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create git tag
        run: |
          git tag "v${{ needs.compute-version.outputs.release_version }}"
          git push origin "v${{ needs.compute-version.outputs.release_version }}"

      - name: Bump to next SNAPSHOT version
        run: |
          sed -i "s/version = .*'.*-SNAPSHOT'/version = project.findProperty('releaseVersion') ?: '${{ needs.compute-version.outputs.next_snapshot }}'/" datafusion-ffi-java/build.gradle
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datafusion-ffi-java/build.gradle
          git commit -m "Bump version to ${{ needs.compute-version.outputs.next_snapshot }} after release ${{ needs.compute-version.outputs.release_version }}"
          git push
